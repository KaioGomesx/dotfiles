# Change prefix from C-b to C-q
unbind-key C-b
set-option -g prefix C-q
bind-key C-q send-prefix

# Enable mouse support (scroll, select pane, resize pane)
set-option -g mouse on

# Split panes with prefix + arrow
# Prefix + Right -> split to the right (side by side)
# Prefix + Left  -> split to the left  (side by side)
# Prefix + Down  -> split downward     (stacked)
# Prefix + Up    -> split upward       (stacked)
bind-key Right split-window -h  -c "#{pane_current_path}"
bind-key Left  split-window -hb -c "#{pane_current_path}"
bind-key Down  split-window -v  -c "#{pane_current_path}"
bind-key Up    split-window -vb -c "#{pane_current_path}"

# Navigate panes with Alt + arrow (no prefix needed)
bind-key -n M-Left select-pane -L
bind-key -n M-Right select-pane -R
bind-key -n M-Up select-pane -U
bind-key -n M-Down select-pane -
